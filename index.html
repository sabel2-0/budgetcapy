<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Capy Budget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #F5F0E8;
    --surface: #FDFAF4;
    --surface2: #EDE8DC;
    --text: #2C2416;
    --text2: #7A6F5A;
    --text3: #B0A898;
    --separator: #D9D2C3;
    --capy-brown: #8B6340;
    --capy-tan: #C4995A;
    --capy-warm: #D4A96A;
    --capy-light: #EDD9B8;
    --capy-dark: #5C3D1E;
    --capy-green: #6B8C5E;
    --capy-sage: #A8BC9A;
    --capy-water: #7AACCF;
    --capy-sky: #C2DDF0;
    --green: #4A7C59;
    --red: #C0402F;
    --orange: #C87B2A;
    --fill: rgba(139,99,64,0.10);
    --fill2: rgba(139,99,64,0.06);
    --radius: 14px;
    --radius-lg: 22px;
    --shadow: 0 2px 12px rgba(92,61,30,0.10);
    --font: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,240,232,0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 12px 20px 8px;
    border-bottom: 0.5px solid var(--separator);
  }
  .nav-title {
    font-size: 17px;
    font-weight: 600;
    text-align: center;
    letter-spacing: -0.3px;
    color: var(--capy-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .nav-month {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 4px;
  }
  .nav-month button {
    background: none;
    border: none;
    color: var(--capy-brown);
    font-size: 20px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s;
  }
  .nav-month button:active { background: var(--fill); }
  .nav-month span {
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    min-width: 120px;
    text-align: center;
  }

  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(253,250,244,0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--separator);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 8px);
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 4px;
    gap: 3px;
    cursor: pointer;
    color: var(--text3);
    transition: color 0.15s;
    font-size: 10px;
    font-weight: 500;
  }
  .tab-item.active { color: var(--capy-brown); }
  .tab-item svg { width: 24px; height: 24px; }
  .tab-item:active { opacity: 0.6; }

  .content {
    padding: 0 16px 120px;
  }
  .page { display: none; }
  .page.active { display: block; }

  /* ── WELCOME / MASCOT AREA ── */
  .welcome-area {
    margin: 16px 0 12px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 0.5px solid var(--separator);
  }
  .mascot-image-area {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(160deg, #C2DDF0 0%, #D4E8C4 50%, #EDD9B8 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .mascot-image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .mascot-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }
  .mascot-placeholder-icon {
    width: 72px;
    height: 72px;
    background: rgba(139,99,64,0.12);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed rgba(139,99,64,0.30);
  }
  .mascot-placeholder-icon svg {
    width: 36px;
    height: 36px;
    color: var(--capy-brown);
    opacity: 0.6;
  }
  .mascot-placeholder-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--capy-brown);
    opacity: 0.7;
  }
  .mascot-placeholder-sub {
    font-size: 11px;
    color: var(--capy-brown);
    opacity: 0.5;
    margin-top: -4px;
  }
  .mascot-upload-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .welcome-info {
    padding: 14px 18px 16px;
  }
  .welcome-greeting {
    font-size: 20px;
    font-weight: 700;
    color: var(--capy-dark);
    letter-spacing: -0.4px;
  }
  .welcome-greeting span {
    color: var(--capy-brown);
  }
  .welcome-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
    line-height: 1.45;
  }

  /* ── BALANCE CARD ── */
  .balance-card {
    background: var(--capy-brown);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 12px;
    color: white;
    box-shadow: 0 4px 20px rgba(139,99,64,0.32);
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -20px;
    width: 140px;
    height: 140px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .balance-card::after {
    content: '';
    position: absolute;
    bottom: -50px;
    right: 40px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .balance-label {
    font-size: 12px;
    opacity: 0.75;
    font-weight: 500;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .balance-amount {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1;
    margin-bottom: 18px;
    position: relative;
  }
  .balance-row {
    display: flex;
    gap: 10px;
    position: relative;
  }
  .balance-item {
    flex: 1;
    background: rgba(255,255,255,0.13);
    border-radius: 12px;
    padding: 10px 12px;
    backdrop-filter: blur(4px);
  }
  .balance-item-label {
    font-size: 11px;
    opacity: 0.75;
    margin-bottom: 3px;
    font-weight: 500;
  }
  .balance-item-amount {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  /* ── TX LIST ── */
  .tx-group-date {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin: 16px 4px 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .tx-list {
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 4px;
    border: 0.5px solid var(--separator);
  }
  .tx-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    transition: background 0.15s;
    position: relative;
  }
  .tx-item:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 60px;
    right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .tx-item:active { background: var(--fill2); }
  .tx-icon {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-category {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tx-note {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tx-amount {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    flex-shrink: 0;
  }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }

  .tx-item-wrap { overflow: hidden; position: relative; }
  .tx-delete-btn {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    background: var(--red);
    color: white;
    border: none;
    padding: 0 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 8px) + 72px);
    right: calc(50% - 215px + 16px);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--capy-brown);
    color: white;
    border: none;
    font-size: 28px;
    box-shadow: 0 4px 18px rgba(139,99,64,0.42);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 90;
  }
  .fab:active {
    transform: scale(0.93);
    box-shadow: 0 2px 8px rgba(139,99,64,0.3);
  }

  /* ── SHEET ── */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.45);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: all; }
  .sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    z-index: 201;
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .sheet.open { transform: translateX(-50%) translateY(0); }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--separator);
    border-radius: 2px;
    margin: 8px auto 0;
  }
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
  }
  .sheet-title { font-size: 17px; font-weight: 600; color: var(--capy-dark); }
  .sheet-cancel {
    background: none; border: none;
    color: var(--capy-brown); font-size: 15px; cursor: pointer; padding: 4px;
  }
  .sheet-done {
    background: none; border: none;
    color: var(--capy-brown); font-size: 15px; font-weight: 600; cursor: pointer; padding: 4px;
  }

  .form-section {
    background: var(--bg);
    border-radius: var(--radius-lg);
    margin: 0 16px 12px;
    overflow: hidden;
  }
  .form-row {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    gap: 12px;
    background: var(--surface);
    position: relative;
  }
  .form-row:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 16px; right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .form-label {
    font-size: 15px;
    color: var(--text);
    min-width: 80px;
    flex-shrink: 0;
  }
  .form-input {
    flex: 1; border: none; outline: none;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    background: transparent;
    text-align: right;
  }
  .form-input::placeholder { color: var(--text3); }
  .form-select {
    flex: 1; border: none; outline: none;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    background: transparent;
    text-align: right;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
  }

  .type-toggle {
    display: flex;
    background: rgba(139,99,64,0.10);
    border-radius: 10px;
    padding: 3px;
    margin: 0 16px 12px;
  }
  .type-btn {
    flex: 1;
    padding: 7px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .type-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(92,61,30,0.14);
  }
  .type-btn.active.expense { color: var(--red); }
  .type-btn.active.income { color: var(--green); }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 0 16px 12px;
  }
  .cat-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 4px;
    background: var(--surface);
    border-radius: 12px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }
  .cat-chip:active { opacity: 0.7; }
  .cat-chip.selected {
    border-color: var(--capy-brown);
    background: rgba(139,99,64,0.07);
  }
  .cat-chip-icon { font-size: 22px; }
  .cat-chip-label {
    font-size: 10px;
    color: var(--text2);
    text-align: center;
    font-weight: 500;
  }
  .cat-chip.selected .cat-chip-label { color: var(--capy-brown); }

  /* ── ANALYTICS ── */
  .donut-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 0 12px;
  }
  .legend-list { width: 100%; margin-top: 12px; }
  .legend-item {
    display: flex;
    align-items: center;
    padding: 8px 0;
    gap: 10px;
    position: relative;
  }
  .legend-item:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 30px; right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-cat { flex: 1; font-size: 14px; font-weight: 500; }
  .legend-pct { font-size: 13px; color: var(--text2); margin-right: 8px; }
  .legend-amt { font-size: 14px; font-weight: 600; color: var(--red); }

  /* ── BUDGETS ── */
  .budget-item { padding: 12px 0; position: relative; }
  .budget-item:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .budget-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
  }
  .budget-cat { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .budget-amounts { font-size: 13px; color: var(--text2); }
  .budget-bar-bg { height: 6px; background: var(--fill); border-radius: 3px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 0.5px solid var(--separator);
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
  .empty-text { font-size: 15px; font-weight: 500; }
  .empty-sub { font-size: 13px; margin-top: 4px; color: var(--text3); }

  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 8px) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(44,36,22,0.92);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-inset {
    font-size: 12px;
    color: var(--text2);
    padding: 14px 4px 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--fill);
    border-top-color: var(--capy-brown);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Quick stats strip */
  .quick-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .quick-stat {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    border: 0.5px solid var(--separator);
    box-shadow: var(--shadow);
  }
  .quick-stat-label {
    font-size: 11px;
    color: var(--text2);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .quick-stat-val {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.6px;
    color: var(--capy-dark);
  }
  .quick-stat-val.green { color: var(--green); }
  .quick-stat-val.red { color: var(--red); }
</style>
</head>
<body>

<div class="nav-bar">
  <div class="nav-title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--capy-tan)"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    Capy Budget
  </div>
  <div class="nav-month">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="content">
  <!-- HOME -->
  <div class="page active" id="page-home">

    <!-- MASCOT WELCOME AREA -->
    <div class="welcome-area" style="margin-top:16px">
      <div class="mascot-image-area" id="mascotArea">
        <div class="mascot-placeholder" id="mascotPlaceholder">
          <div class="mascot-placeholder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="mascot-placeholder-text">Your capybara goes here</div>
          <div class="mascot-placeholder-sub">Tap to upload a photo</div>
        </div>
        <input type="file" class="mascot-upload-input" id="mascotUpload" accept="image/*" onchange="handleMascotUpload(event)">
      </div>
      <div class="welcome-info">
        <div class="welcome-greeting">Hey there, <span>Capy! 🌿</span></div>
        <div class="welcome-sub">Stay chill, spend wisely. Here's your financial vibe this month.</div>
      </div>
    </div>

    <div class="balance-card">
      <div class="balance-label">Net Balance</div>
      <div class="balance-amount" id="balanceAmt">₱0.00</div>
      <div class="balance-row">
        <div class="balance-item">
          <div class="balance-item-label">↑ Income</div>
          <div class="balance-item-amount" id="incomeAmt">₱0</div>
        </div>
        <div class="balance-item">
          <div class="balance-item-label">↓ Expenses</div>
          <div class="balance-item-amount" id="expenseAmt">₱0</div>
        </div>
      </div>
    </div>

    <div id="txListWrap"></div>
  </div>

  <!-- ANALYTICS -->
  <div class="page" id="page-analytics">
    <div class="card" style="margin-top:16px">
      <div class="card-title">Spending by Category</div>
      <div class="donut-wrap" id="donutWrap"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- BUDGETS -->
  <div class="page" id="page-budgets">
    <div id="budgetListWrap" style="margin-top:16px"></div>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="openSheet()">+</button>

<div class="tab-bar">
  <div class="tab-item active" onclick="switchTab('home', this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Home
  </div>
  <div class="tab-item" onclick="switchTab('analytics', this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 17H5v-7h2v7zm6 0h-2V7h2v10zm6 0h-2v-4h2v4z"/><path d="M22 21H2v-2h20v2z"/></svg>
    Analytics
  </div>
  <div class="tab-item" onclick="switchTab('budgets', this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
    Budgets
  </div>
</div>

<!-- ADD SHEET -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <button class="sheet-cancel" onclick="closeSheet()">Cancel</button>
    <div class="sheet-title" id="sheetTitle">Add Transaction</div>
    <button class="sheet-done" onclick="saveTransaction()">Add</button>
  </div>
  <div class="type-toggle">
    <button class="type-btn expense active" id="btnExpense" onclick="setType('expense')">Expense</button>
    <button class="type-btn income" id="btnIncome" onclick="setType('income')">Income</button>
  </div>
  <div class="form-section">
    <div class="form-row">
      <label class="form-label">Amount</label>
      <input class="form-input" id="inputAmount" type="number" inputmode="decimal" placeholder="0.00" min="0">
    </div>
    <div class="form-row">
      <label class="form-label">Date</label>
      <input class="form-input" id="inputDate" type="date">
    </div>
    <div class="form-row">
      <label class="form-label">Note</label>
      <input class="form-input" id="inputNote" type="text" placeholder="Optional">
    </div>
  </div>
  <div class="section-inset" style="padding-left:20px">Category</div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- BUDGET SHEET -->
<div class="sheet" id="budgetSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <button class="sheet-cancel" onclick="closeBudgetSheet()">Cancel</button>
    <div class="sheet-title">Set Budget</div>
    <button class="sheet-done" onclick="saveBudget()">Save</button>
  </div>
  <div class="form-section">
    <div class="form-row">
      <label class="form-label">Category</label>
      <select class="form-select" id="budgetCat"></select>
    </div>
    <div class="form-row">
      <label class="form-label">Limit</label>
      <input class="form-input" id="budgetLimit" type="number" inputmode="decimal" placeholder="0.00" min="0">
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin + '/api';
const CURRENCY = '₱';

const CAPY_COLORS = ['#8B6340','#C4995A','#6B8C5E','#7AACCF','#C0402F','#9B7FA6','#D4874A','#5C8A82'];

const EXPENSE_CATS = [
  { id: 'Food', icon: '🍜', label: 'Food' },
  { id: 'Transport', icon: '🚌', label: 'Transport' },
  { id: 'Shopping', icon: '🛍', label: 'Shopping' },
  { id: 'Bills', icon: '💡', label: 'Bills' },
  { id: 'Health', icon: '💊', label: 'Health' },
  { id: 'Entertainment', icon: '🎮', label: 'Fun' },
  { id: 'Rent', icon: '🏠', label: 'Rent' },
  { id: 'Other', icon: '📦', label: 'Other' },
];
const INCOME_CATS = [
  { id: 'Salary', icon: '💼', label: 'Salary' },
  { id: 'Freelance', icon: '💻', label: 'Freelance' },
  { id: 'Business', icon: '🏪', label: 'Business' },
  { id: 'Investment', icon: '📈', label: 'Invest' },
  { id: 'Gift', icon: '🎁', label: 'Gift' },
  { id: 'Refund', icon: '↩️', label: 'Refund' },
  { id: 'Bonus', icon: '🎉', label: 'Bonus' },
  { id: 'Other', icon: '📦', label: 'Other' },
];

let currentMonth = new Date().toISOString().slice(0,7);
let selectedType = 'expense';
let selectedCat = '';
let transactions = [];
let budgets = [];

function formatMonth(ym) {
  const [y, m] = ym.split('-');
  return new Date(y, m-1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}
function changeMonth(dir) {
  const [y, m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + dir, 1);
  currentMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('monthLabel').textContent = formatMonth(currentMonth);
  refreshAll();
}
document.getElementById('monthLabel').textContent = formatMonth(currentMonth);

let activeTab = 'home';
function switchTab(tab, el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`page-${tab}`).classList.add('active');
  activeTab = tab;
  const fab = document.getElementById('fabBtn');
  if (tab === 'budgets') { fab.onclick = openBudgetSheet; }
  else { fab.onclick = openSheet; }
  if (tab === 'analytics') renderAnalytics();
  if (tab === 'budgets') renderBudgets();
}

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function refreshAll() {
  await Promise.all([loadSummary(), loadTransactions()]);
  if (activeTab === 'analytics') renderAnalytics();
  if (activeTab === 'budgets') renderBudgets();
}

async function loadSummary() {
  const s = await fetchJSON(`${API}/summary?month=${currentMonth}`);
  document.getElementById('balanceAmt').textContent = fmt(s.balance);
  document.getElementById('incomeAmt').textContent = fmt(s.income);
  document.getElementById('expenseAmt').textContent = fmt(s.expense);
}

async function loadTransactions() {
  transactions = await fetchJSON(`${API}/transactions?month=${currentMonth}`);
  renderTransactions();
}

function fmt(n) {
  return CURRENCY + Math.abs(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function getCatIcon(cat) {
  const all = [...EXPENSE_CATS, ...INCOME_CATS];
  return (all.find(c => c.id === cat) || {}).icon || '📦';
}

function getCatBg(cat, type) {
  const list = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  const idx = list.findIndex(c => c.id === cat);
  return CAPY_COLORS[(idx >= 0 ? idx : 7) % CAPY_COLORS.length] + '22';
}

function renderTransactions() {
  const wrap = document.getElementById('txListWrap');
  if (!transactions.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">No transactions yet</div><div class="empty-sub">Tap + to log your first one</div></div>`;
    return;
  }
  const groups = {};
  transactions.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });
  wrap.innerHTML = Object.entries(groups).map(([date, txs]) => {
    const label = formatDate(date);
    const items = txs.map(t => `
      <div class="tx-item-wrap" id="txwrap-${t.id}">
        <button class="tx-delete-btn" onclick="deleteTx(${t.id})">Delete</button>
        <div class="tx-item" ontouchstart="touchStart(event,${t.id})" ontouchend="touchEnd(event,${t.id})" ontouchmove="touchMove(event,${t.id})">
          <div class="tx-icon" style="background:${getCatBg(t.category, t.type)}">${getCatIcon(t.category)}</div>
          <div class="tx-info">
            <div class="tx-category">${t.category}</div>
            ${t.note ? `<div class="tx-note">${t.note}</div>` : ''}
          </div>
          <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
        </div>
      </div>`).join('');
    return `<div class="tx-group-date">${label}</div><div class="tx-list">${items}</div>`;
  }).join('');
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (d.getTime() === today.getTime()) return 'Today';
  if (d.getTime() === yesterday.getTime()) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

let touchX = 0;
function touchStart(e, id) { touchX = e.touches[0].clientX; }
function touchMove(e, id) {
  const dx = e.touches[0].clientX - touchX;
  const item = document.querySelector(`#txwrap-${id} .tx-item`);
  const btn = document.querySelector(`#txwrap-${id} .tx-delete-btn`);
  if (dx < -10) {
    const x = Math.max(-90, Math.min(0, dx));
    item.style.transform = `translateX(${x}px)`;
    btn.style.transform = `translateX(${100 + x/0.9}%)`;
  }
}
function touchEnd(e, id) {
  const dx = e.changedTouches[0].clientX - touchX;
  const item = document.querySelector(`#txwrap-${id} .tx-item`);
  const btn = document.querySelector(`#txwrap-${id} .tx-delete-btn`);
  if (dx < -50) {
    item.style.transform = 'translateX(-90px)';
    btn.style.transform = 'translateX(0%)';
  } else {
    item.style.transform = '';
    btn.style.transform = '';
  }
}

async function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  await fetchJSON(`${API}/transactions/${id}`, { method: 'DELETE' });
  showToast('Deleted');
  refreshAll();
}

function openSheet() {
  setType('expense');
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
  selectedCat = '';
  renderCatGrid();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(() => document.getElementById('inputAmount').focus(), 400);
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function setType(type) {
  selectedType = type;
  selectedCat = '';
  document.getElementById('btnExpense').classList.toggle('active', type === 'expense');
  document.getElementById('btnIncome').classList.toggle('active', type === 'income');
  renderCatGrid();
}

function renderCatGrid() {
  const cats = selectedType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  document.getElementById('catGrid').innerHTML = cats.map(c => `
    <div class="cat-chip ${selectedCat === c.id ? 'selected' : ''}" onclick="selectCat('${c.id}')">
      <div class="cat-chip-icon">${c.icon}</div>
      <div class="cat-chip-label">${c.label}</div>
    </div>`).join('');
}

function selectCat(id) { selectedCat = id; renderCatGrid(); }

async function saveTransaction() {
  const amount = parseFloat(document.getElementById('inputAmount').value);
  const date = document.getElementById('inputDate').value;
  const note = document.getElementById('inputNote').value;
  if (!amount || amount <= 0) return showToast('Enter a valid amount');
  if (!selectedCat) return showToast('Pick a category');
  await fetchJSON(`${API}/transactions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: selectedType, amount, category: selectedCat, note, date })
  });
  closeSheet();
  showToast('Saved ✓');
  refreshAll();
}

async function renderAnalytics() {
  const wrap = document.getElementById('donutWrap');
  wrap.innerHTML = '<div class="spinner"></div>';
  const s = await fetchJSON(`${API}/summary?month=${currentMonth}`);
  const expenses = s.byCategory.filter(x => x.type === 'expense');
  const total = expenses.reduce((a, b) => a + b.total, 0);
  if (!expenses.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">🌾</div><div class="empty-text">No expenses this month</div></div>';
    return;
  }
  const R = 70, cx = 90, cy = 90;
  let offset = -Math.PI / 2;
  const paths = expenses.map((e, i) => {
    const pct = e.total / total;
    const angle = pct * 2 * Math.PI;
    const x1 = cx + R * Math.cos(offset);
    const y1 = cy + R * Math.sin(offset);
    offset += angle;
    const x2 = cx + R * Math.cos(offset);
    const y2 = cy + R * Math.sin(offset);
    const large = angle > Math.PI ? 1 : 0;
    return `<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${CAPY_COLORS[i % CAPY_COLORS.length]}" opacity="0.88"/>`;
  }).join('');
  const legend = expenses.map((e, i) => {
    const pct = ((e.total / total) * 100).toFixed(1);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${CAPY_COLORS[i % CAPY_COLORS.length]}"></div>
      <div class="legend-cat">${getCatIcon(e.category)} ${e.category}</div>
      <div class="legend-pct">${pct}%</div>
      <div class="legend-amt">-${fmt(e.total)}</div>
    </div>`;
  }).join('');
  wrap.innerHTML = `
    <svg viewBox="0 0 180 180" width="180" height="180">
      ${paths}
      <circle cx="${cx}" cy="${cy}" r="48" fill="var(--surface)"/>
      <text x="${cx}" y="${cy - 8}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="var(--text2)" font-family="DM Sans, sans-serif">Total</text>
      <text x="${cx}" y="${cy + 10}" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="var(--capy-dark)" font-family="DM Sans, sans-serif">${fmt(total)}</text>
    </svg>
    <div class="legend-list">${legend}</div>`;
}

async function renderBudgets() {
  budgets = await fetchJSON(`${API}/budgets?month=${currentMonth}`);
  const wrap = document.getElementById('budgetListWrap');
  if (!budgets.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No budgets yet</div><div class="empty-sub">Tap + to set spending limits</div></div>`;
    return;
  }
  const items = budgets.map(b => {
    const pct = Math.min(100, (b.spent / b.limit_amount) * 100);
    const color = pct >= 100 ? '#C0402F' : pct >= 80 ? '#C87B2A' : '#4A7C59';
    return `<div class="budget-item">
      <div class="budget-header">
        <div class="budget-cat">${getCatIcon(b.category)} ${b.category}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="budget-amounts">${fmt(b.spent)} / ${fmt(b.limit_amount)}</div>
          <button onclick="deleteBudget(${b.id})" style="background:none;border:none;color:#C0402F;font-size:16px;cursor:pointer;padding:2px">×</button>
        </div>
      </div>
      <div class="budget-bar-bg">
        <div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
  }).join('');
  wrap.innerHTML = `<div class="card"><div class="card-title">Monthly Budgets</div>${items}</div>`;
}

function openBudgetSheet() {
  document.getElementById('budgetCat').innerHTML = EXPENSE_CATS.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
  document.getElementById('budgetLimit').value = '';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('budgetSheet').classList.add('open');
}
function closeBudgetSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('budgetSheet').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click', () => { closeBudgetSheet(); closeSheet(); });

async function saveBudget() {
  const category = document.getElementById('budgetCat').value;
  const limit_amount = parseFloat(document.getElementById('budgetLimit').value);
  if (!limit_amount || limit_amount <= 0) return showToast('Enter a valid limit');
  await fetchJSON(`${API}/budgets`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ category, limit_amount, month: currentMonth })
  });
  closeBudgetSheet();
  showToast('Budget saved ✓');
  renderBudgets();
}

async function deleteBudget(id) {
  await fetchJSON(`${API}/budgets/${id}`, { method: 'DELETE' });
  showToast('Removed');
  renderBudgets();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function handleMascotUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const area = document.getElementById('mascotArea');
    const placeholder = document.getElementById('mascotPlaceholder');
    placeholder.style.display = 'none';
    const existing = area.querySelector('img');
    if (existing) existing.remove();
    const img = document.createElement('img');
    img.src = e.target.result;
    area.insertBefore(img, area.querySelector('.mascot-upload-input'));
    localStorage.setItem('capyMascotImage', e.target.result);
    showToast('Capybara added! 🌿');
  };
  reader.readAsDataURL(file);
}

(function restoreMascot() {
  try {
    const saved = localStorage.getItem('capyMascotImage');
    if (saved) {
      const area = document.getElementById('mascotArea');
      const placeholder = document.getElementById('mascotPlaceholder');
      placeholder.style.display = 'none';
      const img = document.createElement('img');
      img.src = saved;
      area.insertBefore(img, area.querySelector('.mascot-upload-input'));
    }
  } catch(e) {}
})();

refreshAll();
</script>
</body>
</html>
