<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Capy Budget</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sora: ['Sora', 'sans-serif'], mono: ['DM Mono', 'monospace'] },
        colors: {
          capy: {
            50: '#FDF9F3', 100: '#F5EDE0', 200: '#EDD9B8', 300: '#D4A96A',
            400: '#C4995A', 500: '#8B6340', 600: '#7A5530', 700: '#5C3D1E',
            800: '#3D2710', 900: '#1E1208',
          },
          sage: { 400: '#A8BC9A', 500: '#6B8C5E', 600: '#4A7C59' },
          sky: { 300: '#C2DDF0', 400: '#7AACCF' },
          warm: { 50: '#FDFAF4', 100: '#F5F0E8', 200: '#EDE8DC', 300: '#D9D2C3', 400: '#B0A898', 500: '#7A6F5A', 600: '#2C2416' },
        },
        animation: {
          'slide-up': 'slideUp 0.35s cubic-bezier(0.32,0.72,0,1)',
          'fade-in': 'fadeIn 0.3s ease',
          'spin-slow': 'spin 0.7s linear infinite',
          'bar-fill': 'barFill 0.6s cubic-bezier(0.34,1.56,0.64,1)',
        },
        keyframes: {
          slideUp: { from: { transform: 'translateY(100%)' }, to: { transform: 'translateY(0)' } },
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          barFill: { from: { width: '0%' }, to: {} },
        }
      }
    }
  }
</script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Sora', sans-serif; }
  .sheet-enter { animation: slideUp 0.35s cubic-bezier(0.32,0.72,0,1) forwards; }
  .tx-swipe { transition: transform 0.22s ease; }
  .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom, 0px), 8px); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
  .bar-animate { animation: barFill 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .progress-bar { transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  ::-webkit-scrollbar { display: none; }
  .chip-selected { box-shadow: 0 0 0 2px #8B6340; }
  .toast-show { animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards; }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
  .nav-glass { background: rgba(245,240,232,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .tab-glass { background: rgba(253,250,244,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .sheet-bg { background: rgba(44,36,22,0.5); }
  .donut-segment { transition: opacity 0.2s; }
  .donut-segment:hover { opacity: 0.8; }
</style>
</head>
<body class="bg-warm-100 text-warm-600 min-h-screen overflow-x-hidden" style="max-width:430px;margin:0 auto;">

<!-- NAV BAR -->
<header class="nav-glass sticky top-0 z-50 border-b border-warm-300/50 px-5 pt-3 pb-2">
  <div class="flex items-center justify-center gap-2">
    <span class="text-capy-500">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="3"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    </span>
    <span class="text-[17px] font-bold tracking-tight text-capy-700">Capy Budget</span>
    <span class="text-base">🌿</span>
  </div>
  <div class="flex items-center justify-center gap-3 mt-1.5">
    <button onclick="changeMonth(-1)" class="w-7 h-7 flex items-center justify-center rounded-full text-capy-500 hover:bg-capy-100 active:bg-capy-200 transition text-xl font-light">‹</button>
    <span id="monthLabel" class="text-[13px] font-semibold text-warm-500 min-w-[128px] text-center tracking-wide"></span>
    <button onclick="changeMonth(1)" class="w-7 h-7 flex items-center justify-center rounded-full text-capy-500 hover:bg-capy-100 active:bg-capy-200 transition text-xl font-light">›</button>
  </div>
</header>

<!-- CONTENT -->
<main class="pb-28 px-4">

  <!-- HOME PAGE -->
  <div id="page-home" class="page">

    <!-- Mascot Card -->
    <div class="mt-4 bg-warm-50 rounded-2xl overflow-hidden shadow-sm border border-warm-300/40">
      <label class="relative block cursor-pointer group" style="aspect-ratio:16/9;">
        <div id="mascotPlaceholder" class="absolute inset-0 bg-gradient-to-br from-sky-300 via-sage-400/40 to-capy-200 flex flex-col items-center justify-center gap-2">
          <div class="w-16 h-16 rounded-full bg-white/30 border-2 border-dashed border-capy-400/50 flex items-center justify-center">
            <svg class="w-8 h-8 text-capy-500 opacity-70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <span class="text-[13px] font-semibold text-capy-600 opacity-80">Upload your capybara</span>
          <span class="text-[11px] text-capy-500 opacity-60">Tap to add a photo</span>
        </div>
        <img id="mascotImg" class="w-full h-full object-cover hidden" alt="Mascot">
        <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full" onchange="handleMascotUpload(event)">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors"></div>
      </label>
      <div class="px-5 py-4">
        <h2 class="text-[21px] font-bold tracking-tight text-capy-700">Hey there, <span class="text-capy-500">Capy! 🌿</span></h2>
        <p class="text-[13px] text-warm-500 mt-1 leading-relaxed">Stay chill, spend wisely — here's your financial snapshot.</p>
      </div>
    </div>

    <!-- Balance Card -->
    <div class="mt-3 rounded-2xl p-5 text-white relative overflow-hidden shadow-lg" style="background:linear-gradient(135deg,#8B6340 0%,#C4995A 100%);">
      <div class="absolute -top-8 -right-6 w-36 h-36 rounded-full bg-white/[0.06]"></div>
      <div class="absolute -bottom-12 right-10 w-24 h-24 rounded-full bg-white/[0.04]"></div>
      <div class="relative">
        <div class="text-[11px] font-semibold uppercase tracking-widest opacity-70 mb-1">Net Balance</div>
        <div id="balanceAmt" class="text-[38px] font-bold tracking-tight leading-none mb-5 font-sora">₱0.00</div>
        <div class="grid grid-cols-2 gap-2.5">
          <div class="bg-white/[0.14] rounded-xl p-3 backdrop-blur-sm">
            <div class="text-[11px] opacity-70 font-medium mb-1">↑ Income</div>
            <div id="incomeAmt" class="text-[17px] font-bold tracking-tight">₱0</div>
          </div>
          <div class="bg-white/[0.14] rounded-xl p-3 backdrop-blur-sm">
            <div class="text-[11px] opacity-70 font-medium mb-1">↓ Expenses</div>
            <div id="expenseAmt" class="text-[17px] font-bold tracking-tight">₱0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Stats Row -->
    <div id="quickStats" class="grid grid-cols-3 gap-2 mt-3"></div>

    <!-- Transaction List -->
    <div id="txListWrap" class="mt-1"></div>
  </div>

  <!-- ANALYTICS PAGE -->
  <div id="page-analytics" class="page hidden">
    <div class="mt-4 bg-warm-50 rounded-2xl p-4 shadow-sm border border-warm-300/40">
      <div class="text-[11px] font-bold uppercase tracking-widest text-warm-400 mb-3">Spending by Category</div>
      <div id="donutWrap" class="flex flex-col items-center"><div class="spinner my-6"></div></div>
    </div>
    <!-- Monthly Trend -->
    <div id="trendCard" class="mt-3 bg-warm-50 rounded-2xl p-4 shadow-sm border border-warm-300/40 hidden">
      <div class="text-[11px] font-bold uppercase tracking-widest text-warm-400 mb-3">This Month vs Last</div>
      <div id="trendContent"></div>
    </div>
  </div>

  <!-- BUDGETS PAGE -->
  <div id="page-budgets" class="page hidden">
    <div id="budgetListWrap" class="mt-4"></div>
  </div>

</main>

<!-- FAB -->
<button id="fabBtn" onclick="openSheet()" class="fixed z-40 w-14 h-14 rounded-full bg-capy-500 text-white text-3xl shadow-xl flex items-center justify-center active:scale-90 transition-transform" style="bottom:calc(max(env(safe-area-inset-bottom,8px),8px) + 72px);right:20px;">+</button>

<!-- TAB BAR -->
<nav class="tab-glass fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] border-t border-warm-300/50 z-50 flex safe-bottom">
  <button class="tab-item flex-1 flex flex-col items-center pt-2 pb-1 gap-1 text-capy-500 transition-colors active" data-tab="home" onclick="switchTab('home',this)">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span class="text-[10px] font-semibold">Home</span>
  </button>
  <button class="tab-item flex-1 flex flex-col items-center pt-2 pb-1 gap-1 text-warm-400 transition-colors" data-tab="analytics" onclick="switchTab('analytics',this)">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M7 17H5v-7h2v7zm6 0h-2V7h2v10zm6 0h-2v-4h2v4z"/><path d="M22 21H2v-2h20v2z"/></svg>
    <span class="text-[10px] font-semibold">Analytics</span>
  </button>
  <button class="tab-item flex-1 flex flex-col items-center pt-2 pb-1 gap-1 text-warm-400 transition-colors" data-tab="budgets" onclick="switchTab('budgets',this)">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
    <span class="text-[10px] font-semibold">Budgets</span>
  </button>
</nav>

<!-- OVERLAY -->
<div id="overlay" class="hidden fixed inset-0 sheet-bg z-[200] opacity-0 transition-opacity duration-300" onclick="closeAll()"></div>

<!-- ADD TRANSACTION SHEET -->
<div id="sheet" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-warm-50 rounded-t-3xl z-[201] safe-bottom">
  <div class="w-9 h-1 bg-warm-300 rounded-full mx-auto mt-2.5"></div>
  <div class="flex items-center justify-between px-5 pt-4 pb-2">
    <button onclick="closeSheet()" class="text-capy-500 text-[15px] px-1 active:opacity-60">Cancel</button>
    <h3 class="text-[17px] font-bold text-capy-700">Add Transaction</h3>
    <button onclick="saveTransaction()" id="saveTxBtn" class="text-capy-500 text-[15px] font-bold px-1 active:opacity-60">Add</button>
  </div>

  <!-- Type Toggle -->
  <div class="mx-4 mb-3 flex bg-capy-100/60 rounded-xl p-1 gap-1">
    <button id="btnExpense" onclick="setType('expense')" class="flex-1 py-2 rounded-lg text-[14px] font-semibold text-red-600 bg-warm-50 shadow-sm transition-all">Expense</button>
    <button id="btnIncome" onclick="setType('income')" class="flex-1 py-2 rounded-lg text-[14px] font-semibold text-warm-500 transition-all">Income</button>
  </div>

  <!-- Amount Display -->
  <div class="mx-4 mb-3 bg-warm-50 rounded-2xl border border-warm-300/40 overflow-hidden">
    <div class="px-4 py-3 border-b border-warm-300/30 flex items-center gap-3">
      <span class="text-[15px] text-warm-500 min-w-[72px]">Amount</span>
      <div class="flex items-center flex-1 justify-end gap-1">
        <span class="text-[15px] font-semibold text-warm-500">₱</span>
        <input id="inputAmount" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01"
          class="flex-1 text-right text-[17px] font-bold bg-transparent border-none outline-none text-warm-600 placeholder-warm-400 font-mono">
      </div>
    </div>
    <div class="px-4 py-3 border-b border-warm-300/30 flex items-center gap-3">
      <span class="text-[15px] text-warm-500 min-w-[72px]">Date</span>
      <input id="inputDate" type="date"
        class="flex-1 text-right text-[15px] bg-transparent border-none outline-none text-warm-600">
    </div>
    <div class="px-4 py-3 flex items-center gap-3">
      <span class="text-[15px] text-warm-500 min-w-[72px]">Note</span>
      <input id="inputNote" type="text" placeholder="What was this for?"
        class="flex-1 text-right text-[15px] bg-transparent border-none outline-none text-warm-600 placeholder-warm-400">
    </div>
  </div>

  <!-- Category Section -->
  <div class="px-5 mb-2">
    <div class="text-[11px] font-bold uppercase tracking-widest text-warm-400">Category</div>
  </div>
  <div id="catGrid" class="grid grid-cols-4 gap-2 px-4 pb-4"></div>
</div>

<!-- BUDGET SHEET -->
<div id="budgetSheet" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-warm-50 rounded-t-3xl z-[201] safe-bottom">
  <div class="w-9 h-1 bg-warm-300 rounded-full mx-auto mt-2.5"></div>
  <div class="flex items-center justify-between px-5 pt-4 pb-2">
    <button onclick="closeBudgetSheet()" class="text-capy-500 text-[15px] px-1 active:opacity-60">Cancel</button>
    <h3 class="text-[17px] font-bold text-capy-700">Set Budget</h3>
    <button onclick="saveBudget()" id="saveBudgetBtn" class="text-capy-500 text-[15px] font-bold px-1 active:opacity-60">Save</button>
  </div>
  <div class="mx-4 mb-4 bg-warm-50 rounded-2xl border border-warm-300/40 overflow-hidden">
    <div class="px-4 py-3 border-b border-warm-300/30 flex items-center gap-3">
      <span class="text-[15px] text-warm-500 min-w-[80px]">Category</span>
      <select id="budgetCat" class="flex-1 text-right text-[15px] bg-transparent border-none outline-none text-warm-600 cursor-pointer appearance-none"></select>
    </div>
    <div class="px-4 py-3 flex items-center gap-3">
      <span class="text-[15px] text-warm-500 min-w-[80px]">Limit</span>
      <div class="flex items-center flex-1 justify-end gap-1">
        <span class="text-[15px] font-semibold text-warm-500">₱</span>
        <input id="budgetLimit" type="number" inputmode="decimal" placeholder="0.00" min="0"
          class="flex-1 text-right text-[17px] font-bold bg-transparent border-none outline-none text-warm-600 placeholder-warm-400 font-mono">
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed z-[999] left-1/2 -translate-x-1/2 bg-capy-800/95 text-white text-[14px] font-semibold px-5 py-2.5 rounded-full pointer-events-none opacity-0 transition-opacity whitespace-nowrap" style="bottom:calc(max(env(safe-area-inset-bottom,8px),8px) + 80px)"></div>

<style>
  .spinner{width:28px;height:28px;border:3px solid #EDE8DC;border-top-color:#8B6340;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tab-item.active{color:#8B6340;}
  .tab-item{color:#B0A898;}
  .page{display:none;}
  .page.active{display:block;}
</style>

<script>
const API = window.location.origin + '/api';
const CURRENCY = '₱';
const CAPY_COLORS = ['#8B6340','#C4995A','#6B8C5E','#7AACCF','#C0402F','#9B7FA6','#D4874A','#5C8A82'];

const EXPENSE_CATS = [
  {id:'Food',icon:'🍜',label:'Food'},
  {id:'Transport',icon:'🚌',label:'Transport'},
  {id:'Shopping',icon:'🛍',label:'Shopping'},
  {id:'Bills',icon:'💡',label:'Bills'},
  {id:'Health',icon:'💊',label:'Health'},
  {id:'Entertainment',icon:'🎮',label:'Fun'},
  {id:'Rent',icon:'🏠',label:'Rent'},
  {id:'Other',icon:'📦',label:'Other'},
];
const INCOME_CATS = [
  {id:'Salary',icon:'💼',label:'Salary'},
  {id:'Freelance',icon:'💻',label:'Freelance'},
  {id:'Business',icon:'🏪',label:'Business'},
  {id:'Investment',icon:'📈',label:'Invest'},
  {id:'Gift',icon:'🎁',label:'Gift'},
  {id:'Refund',icon:'↩️',label:'Refund'},
  {id:'Bonus',icon:'🎉',label:'Bonus'},
  {id:'Other',icon:'📦',label:'Other'},
];

let currentMonth = new Date().toISOString().slice(0,7);
let selectedType = 'expense';
let selectedCat = '';
let transactions = [];
let budgets = [];
let touchX = 0, touchStartY = 0;
let isSaving = false;
let activeTab = 'home';

// ─── UTILS ───────────────────────────────────────────────
function formatMonth(ym) {
  const [y,m] = ym.split('-');
  return new Date(y, m-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

function localDate(dateStr) {
  if (!dateStr) return new Date();
  const parts = String(dateStr).split('T')[0].split('-');
  if (parts.length === 3) return new Date(+parts[0], +parts[1]-1, +parts[2]);
  return new Date(dateStr);
}

function formatDate(dateStr) {
  try {
    const d = localDate(dateStr);
    if (isNaN(d.getTime())) return 'Unknown date';
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
    const cmp = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (cmp.getTime() === today.getTime()) return 'Today';
    if (cmp.getTime() === yesterday.getTime()) return 'Yesterday';
    return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  } catch { return 'Unknown date'; }
}

function formatDateTime(dateStr) {
  try {
    const d = localDate(dateStr);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  } catch { return ''; }
}

function fmt(n) {
  const num = parseFloat(n);
  if (isNaN(num)) return CURRENCY + '0.00';
  return CURRENCY + Math.abs(num).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function getCatIcon(cat) {
  const all = [...EXPENSE_CATS, ...INCOME_CATS];
  return (all.find(c => c.id === cat) || {}).icon || '📦';
}

function getCatBg(cat, type) {
  const list = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  const idx = list.findIndex(c => c.id === cat);
  return CAPY_COLORS[(idx >= 0 ? idx : 7) % CAPY_COLORS.length];
}

function escHtml(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ─── MONTH NAV ───────────────────────────────────────────
function changeMonth(dir) {
  const [y,m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m-1+dir, 1);
  currentMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('monthLabel').textContent = formatMonth(currentMonth);
  refreshAll();
}
document.getElementById('monthLabel').textContent = formatMonth(currentMonth);

// ─── TABS ────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.classList.add('hidden'); });
  el.classList.add('active');
  const pg = document.getElementById(`page-${tab}`);
  pg.classList.remove('hidden');
  pg.classList.add('active');
  activeTab = tab;
  const fab = document.getElementById('fabBtn');
  if (tab === 'budgets') { fab.onclick = openBudgetSheet; }
  else { fab.onclick = openSheet; }
  if (tab === 'analytics') renderAnalytics();
  if (tab === 'budgets') renderBudgets();
}

// ─── API ─────────────────────────────────────────────────
async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function refreshAll() {
  await Promise.all([loadSummary(), loadTransactions()]);
  if (activeTab === 'analytics') renderAnalytics();
  if (activeTab === 'budgets') renderBudgets();
}

async function loadSummary() {
  try {
    const s = await fetchJSON(`${API}/summary?month=${currentMonth}`);
    const bal = parseFloat(s.balance) || 0;
    const inc = parseFloat(s.income) || 0;
    const exp = parseFloat(s.expense) || 0;
    document.getElementById('balanceAmt').textContent = fmt(bal);
    document.getElementById('incomeAmt').textContent = fmt(inc);
    document.getElementById('expenseAmt').textContent = fmt(exp);
    renderQuickStats(s);
  } catch(e) { console.error(e); }
}

function renderQuickStats(s) {
  const txCount = (transactions || []).length;
  const avgSpend = txCount > 0 && s.expense > 0 ? (parseFloat(s.expense)||0) / txCount : 0;
  const wrap = document.getElementById('quickStats');
  wrap.innerHTML = `
    <div class="bg-warm-50 rounded-xl p-3 border border-warm-300/40 text-center">
      <div class="text-[10px] font-bold uppercase tracking-wider text-warm-400 mb-1">Transactions</div>
      <div class="text-[20px] font-bold text-capy-700">${txCount}</div>
    </div>
    <div class="bg-warm-50 rounded-xl p-3 border border-warm-300/40 text-center">
      <div class="text-[10px] font-bold uppercase tracking-wider text-warm-400 mb-1">Avg Spend</div>
      <div class="text-[14px] font-bold text-capy-700">${fmt(avgSpend)}</div>
    </div>
    <div class="bg-warm-50 rounded-xl p-3 border border-warm-300/40 text-center">
      <div class="text-[10px] font-bold uppercase tracking-wider text-warm-400 mb-1">Savings</div>
      <div class="text-[14px] font-bold ${(parseFloat(s.balance)||0) >= 0 ? 'text-sage-600' : 'text-red-600'}">${fmt(s.balance)}</div>
    </div>
  `;
}

// ─── TRANSACTIONS ─────────────────────────────────────────
async function loadTransactions() {
  try {
    transactions = await fetchJSON(`${API}/transactions?month=${currentMonth}`);
    renderTransactions();
  } catch(e) { console.error(e); }
}

function renderTransactions() {
  const wrap = document.getElementById('txListWrap');
  if (!transactions.length) {
    wrap.innerHTML = `<div class="text-center py-14 text-warm-400">
      <div class="text-5xl mb-3">🌿</div>
      <div class="text-[15px] font-semibold">No transactions yet</div>
      <div class="text-[13px] mt-1 text-warm-400/70">Tap + to log your first one</div>
    </div>`;
    return;
  }

  const groups = {};
  transactions.forEach(t => {
    const key = (t.date||'').split('T')[0];
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));

  wrap.innerHTML = sortedDates.map(date => {
    const label = formatDate(date);
    const fullDate = formatDateTime(date);
    const txs = groups[date];
    const dayTotal = txs.reduce((sum,t) => {
      const amt = parseFloat(t.amount) || 0;
      return sum + (t.type === 'income' ? amt : -amt);
    }, 0);

    const items = txs.map(t => {
      const amt = parseFloat(t.amount) || 0;
      const color = getCatBg(t.category, t.type);
      return `
      <div class="tx-item-wrap overflow-hidden relative" id="txwrap-${t.id}">
        <button class="absolute right-0 top-0 bottom-0 bg-red-500 text-white text-[13px] font-semibold px-5 flex items-center z-10 tx-delete-btn" style="transform:translateX(100%);transition:transform 0.22s;" onclick="deleteTx(${t.id})">Delete</button>
        <div class="tx-swipe flex items-center gap-3 px-4 py-3 bg-warm-50 active:bg-capy-50 cursor-pointer relative"
             ontouchstart="touchStart(event,${t.id})" ontouchmove="touchMove(event,${t.id})" ontouchend="touchEnd(event,${t.id})"
             onmousedown="mouseStart(event,${t.id})" onmousemove="mouseMove(event,${t.id})" onmouseup="mouseEnd(event,${t.id})">
          <div class="w-10 h-10 rounded-[13px] flex items-center justify-center text-[19px] flex-shrink-0" style="background:${color}22;">${getCatIcon(t.category)}</div>
          <div class="flex-1 min-w-0">
            <div class="text-[15px] font-semibold text-warm-600 truncate">${escHtml(t.category)}</div>
            <div class="flex items-center gap-2 mt-0.5">
              ${t.note ? `<span class="text-[12px] text-warm-400 truncate">${escHtml(t.note)}</span>` : ''}
              <span class="text-[11px] text-warm-400/60 font-mono flex-shrink-0">${formatDateTime(t.date)}</span>
            </div>
          </div>
          <div class="text-right flex-shrink-0">
            <div class="text-[15px] font-bold ${t.type === 'income' ? 'text-sage-600' : 'text-red-600'}">${t.type==='income'?'+':'-'}${fmt(amt)}</div>
            <div class="text-[10px] font-semibold uppercase tracking-wide mt-0.5 px-1.5 py-0.5 rounded-full inline-block ${t.type==='income'?'bg-sage-500/10 text-sage-600':'bg-red-50 text-red-500'}">${t.type}</div>
          </div>
        </div>
      </div>`;
    }).join('<div class="h-px bg-warm-200/60 mx-4"></div>');

    const dayNet = dayTotal >= 0;
    return `
      <div class="mt-4 mb-1 px-1 flex items-center justify-between">
        <div>
          <span class="text-[12px] font-bold uppercase tracking-widest text-warm-400">${label}</span>
          ${label !== 'Today' && label !== 'Yesterday' ? '' : `<span class="ml-2 text-[11px] text-warm-400/60">${fullDate}</span>`}
        </div>
        <span class="text-[12px] font-semibold ${dayNet?'text-sage-600':'text-red-500'}">${dayNet?'+':''}${fmt(dayTotal)}</span>
      </div>
      <div class="bg-warm-50 rounded-2xl overflow-hidden border border-warm-300/40 shadow-sm">${items}</div>`;
  }).join('');
}

// ─── SWIPE TO DELETE ─────────────────────────────────────
function touchStart(e, id) { touchX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }
function touchMove(e, id) {
  const dx = e.touches[0].clientX - touchX;
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dy > 12) return; // vertical scroll
  if (dx < -8) {
    e.preventDefault();
    const x = Math.max(-90, Math.min(0, dx));
    const item = document.querySelector(`#txwrap-${id} .tx-swipe`);
    const btn = document.querySelector(`#txwrap-${id} .tx-delete-btn`);
    if (item) item.style.transform = `translateX(${x}px)`;
    if (btn) btn.style.transform = `translateX(${100 + x}%)`;
  }
}
function touchEnd(e, id) {
  const dx = e.changedTouches[0].clientX - touchX;
  applySwipeEnd(id, dx);
  touchX = 0;
}
function mouseStart(e, id) { if (e.button !== 0) return; e.preventDefault(); touchX = e.clientX; }
function mouseMove(e, id) { if (!touchX) return; const dx = e.clientX-touchX; if (dx<-8){const x=Math.max(-90,Math.min(0,dx));const item=document.querySelector(`#txwrap-${id} .tx-swipe`);const btn=document.querySelector(`#txwrap-${id} .tx-delete-btn`);if(item)item.style.transform=`translateX(${x}px)`;if(btn)btn.style.transform=`translateX(${100+x}%)`;} }
function mouseEnd(e, id) { if (!touchX) return; applySwipeEnd(id, e.clientX - touchX); touchX = 0; }
function applySwipeEnd(id, dx) {
  const item = document.querySelector(`#txwrap-${id} .tx-swipe`);
  const btn = document.querySelector(`#txwrap-${id} .tx-delete-btn`);
  if (dx < -48) {
    if (item) item.style.transform = 'translateX(-90px)';
    if (btn) btn.style.transform = 'translateX(0%)';
  } else {
    if (item) item.style.transform = '';
    if (btn) btn.style.transform = 'translateX(100%)';
  }
}

async function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  try {
    await fetchJSON(`${API}/transactions/${id}`, {method:'DELETE'});
    showToast('Deleted ✓');
    refreshAll();
  } catch(e) { showToast('Error deleting'); }
}

// ─── SHEET ───────────────────────────────────────────────
function openSheet() {
  setType('expense');
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputNote').value = '';
  const today = new Date();
  document.getElementById('inputDate').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  selectedCat = '';
  renderCatGrid();
  showOverlay('sheet');
  setTimeout(() => document.getElementById('inputAmount').focus(), 400);
}
function closeSheet() { hideOverlay('sheet'); }

function openBudgetSheet() {
  document.getElementById('budgetCat').innerHTML = EXPENSE_CATS.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
  document.getElementById('budgetLimit').value = '';
  showOverlay('budgetSheet');
}
function closeBudgetSheet() { hideOverlay('budgetSheet'); }

function showOverlay(sheetId) {
  const ov = document.getElementById('overlay');
  const sh = document.getElementById(sheetId);
  ov.classList.remove('hidden');
  sh.classList.remove('hidden');
  requestAnimationFrame(() => { ov.style.opacity = '1'; sh.style.transform = 'translateX(-50%) translateY(0)'; sh.classList.add('sheet-enter'); });
}
function hideOverlay(sheetId) {
  const ov = document.getElementById('overlay');
  const sh = document.getElementById(sheetId);
  ov.style.opacity = '0';
  sh.style.transform = '';
  setTimeout(() => { ov.classList.add('hidden'); sh.classList.add('hidden'); sh.classList.remove('sheet-enter'); }, 300);
}
function closeAll() { closeSheet(); closeBudgetSheet(); }

function setType(type) {
  selectedType = type;
  selectedCat = '';
  const eBtn = document.getElementById('btnExpense');
  const iBtn = document.getElementById('btnIncome');
  if (type === 'expense') {
    eBtn.className = 'flex-1 py-2 rounded-lg text-[14px] font-semibold text-red-600 bg-warm-50 shadow-sm transition-all';
    iBtn.className = 'flex-1 py-2 rounded-lg text-[14px] font-semibold text-warm-400 transition-all';
  } else {
    iBtn.className = 'flex-1 py-2 rounded-lg text-[14px] font-semibold text-sage-600 bg-warm-50 shadow-sm transition-all';
    eBtn.className = 'flex-1 py-2 rounded-lg text-[14px] font-semibold text-warm-400 transition-all';
  }
  renderCatGrid();
}

function renderCatGrid() {
  const cats = selectedType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  document.getElementById('catGrid').innerHTML = cats.map(c => `
    <button onclick="selectCat('${c.id}')" class="flex flex-col items-center gap-1.5 py-3 px-1 bg-warm-50 rounded-xl border-2 transition-all active:opacity-70 ${selectedCat===c.id?'border-capy-500 bg-capy-50 chip-selected':'border-warm-300/40'}">
      <span class="text-[22px]">${c.icon}</span>
      <span class="text-[10px] font-semibold ${selectedCat===c.id?'text-capy-600':'text-warm-400'} text-center leading-tight">${c.label}</span>
    </button>`).join('');
}

function selectCat(id) { selectedCat = id; renderCatGrid(); }

async function saveTransaction() {
  if (isSaving) return;
  const amount = parseFloat(document.getElementById('inputAmount').value);
  let date = document.getElementById('inputDate').value;
  const note = document.getElementById('inputNote').value;
  if (!amount || amount <= 0) return showToast('Enter a valid amount');
  if (!selectedCat) return showToast('Pick a category');
  if (!date) { const t = new Date(); date = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }

  isSaving = true;
  const btn = document.getElementById('saveTxBtn');
  btn.textContent = '...'; btn.style.opacity = '0.5';
  try {
    await fetchJSON(`${API}/transactions`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({type:selectedType, amount, category:selectedCat, note, date})
    });
    closeSheet();
    showToast('Saved ✓');
    await refreshAll();
  } catch(e) { showToast('Error saving'); }
  finally { isSaving = false; btn.textContent = 'Add'; btn.style.opacity = ''; }
}

// ─── ANALYTICS ───────────────────────────────────────────
async function renderAnalytics() {
  const wrap = document.getElementById('donutWrap');
  wrap.innerHTML = '<div class="spinner my-6"></div>';

  try {
    const s = await fetchJSON(`${API}/summary?month=${currentMonth}`);
    const byCat = (s.byCategory || []).filter(x => x.type === 'expense');
    const totalRaw = byCat.reduce((a,b) => a + (parseFloat(b.total)||0), 0);

    if (!byCat.length || totalRaw === 0) {
      wrap.innerHTML = `<div class="text-center py-10 text-warm-400"><div class="text-4xl mb-2">🌾</div><div class="text-[15px] font-semibold">No expenses this month</div></div>`;
      return;
    }

    // Build SVG donut
    const R = 66, r = 42, cx = 90, cy = 90;
    let startAngle = -Math.PI / 2;
    const segments = byCat.map((e, i) => {
      const pct = (parseFloat(e.total)||0) / totalRaw;
      const angle = pct * 2 * Math.PI;
      const x1 = cx + R * Math.cos(startAngle), y1 = cy + R * Math.sin(startAngle);
      startAngle += angle;
      const x2 = cx + R * Math.cos(startAngle), y2 = cy + R * Math.sin(startAngle);
      const large = angle > Math.PI ? 1 : 0;
      const color = CAPY_COLORS[i % CAPY_COLORS.length];
      return `<path class="donut-segment" d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${color}" opacity="0.87"/>`;
    }).join('');

    const legend = byCat.map((e, i) => {
      const amt = parseFloat(e.total) || 0;
      const pct = totalRaw > 0 ? ((amt / totalRaw) * 100).toFixed(1) : '0.0';
      const color = CAPY_COLORS[i % CAPY_COLORS.length];
      return `
        <div class="flex items-center gap-3 py-2.5 border-b border-warm-200/50 last:border-0">
          <div class="w-3 h-3 rounded-full flex-shrink-0" style="background:${color}"></div>
          <div class="flex-1 flex items-center gap-1.5">
            <span class="text-base">${getCatIcon(e.category)}</span>
            <span class="text-[14px] font-semibold text-warm-600">${escHtml(e.category)}</span>
          </div>
          <div class="text-right">
            <div class="text-[14px] font-bold text-red-600">-${fmt(amt)}</div>
            <div class="text-[11px] text-warm-400">${pct}%</div>
          </div>
        </div>`;
    }).join('');

    wrap.innerHTML = `
      <div class="flex flex-col items-center">
        <svg viewBox="0 0 180 180" width="180" height="180">
          ${segments}
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="#FDFAF4"/>
          <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="11" fill="#7A6F5A" font-family="Sora,sans-serif" font-weight="600">Total</text>
          <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="15" font-weight="700" fill="#3D2710" font-family="Sora,sans-serif">${fmt(totalRaw)}</text>
          <text x="${cx}" y="${cy+24}" text-anchor="middle" font-size="10" fill="#B0A898" font-family="Sora,sans-serif">expenses</text>
        </svg>
        <div class="w-full mt-2">${legend}</div>
      </div>`;

    // Trend card
    const incomeTotal = parseFloat(s.income) || 0;
    const savingsRate = incomeTotal > 0 ? (((incomeTotal - totalRaw) / incomeTotal) * 100).toFixed(1) : 0;
    document.getElementById('trendCard').classList.remove('hidden');
    document.getElementById('trendContent').innerHTML = `
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-warm-100 rounded-xl p-3 text-center">
          <div class="text-[10px] font-bold uppercase tracking-wider text-warm-400 mb-1">Savings Rate</div>
          <div class="text-[22px] font-bold ${savingsRate>=20?'text-sage-600':savingsRate>=0?'text-capy-500':'text-red-600'}">${savingsRate}%</div>
          <div class="text-[11px] text-warm-400 mt-0.5">${savingsRate>=20?'Great job! 🎉':savingsRate>=0?'Keep going 💪':'Over budget ⚠️'}</div>
        </div>
        <div class="bg-warm-100 rounded-xl p-3 text-center">
          <div class="text-[10px] font-bold uppercase tracking-wider text-warm-400 mb-1">Categories</div>
          <div class="text-[22px] font-bold text-capy-700">${byCat.length}</div>
          <div class="text-[11px] text-warm-400 mt-0.5">spending areas</div>
        </div>
      </div>
    `;

  } catch(e) {
    console.error(e);
    wrap.innerHTML = `<div class="text-center py-8 text-warm-400"><div class="text-[15px]">Error loading data</div></div>`;
  }
}

// ─── BUDGETS ─────────────────────────────────────────────
async function renderBudgets() {
  const wrap = document.getElementById('budgetListWrap');
  wrap.innerHTML = '<div class="spinner my-8"></div>';
  try {
    budgets = await fetchJSON(`${API}/budgets?month=${currentMonth}`);
    if (!budgets.length) {
      wrap.innerHTML = `<div class="bg-warm-50 rounded-2xl p-6 text-center border border-warm-300/40">
        <div class="text-4xl mb-3">🎯</div>
        <div class="text-[16px] font-bold text-capy-700">No budgets yet</div>
        <div class="text-[13px] text-warm-400 mt-1.5">Tap + to set spending limits</div>
      </div>`;
      return;
    }

    // Summary row
    const totalBudgeted = budgets.reduce((a,b) => a + (parseFloat(b.limit_amount)||0), 0);
    const totalSpent = budgets.reduce((a,b) => a + (parseFloat(b.spent)||0), 0);
    const overallPct = totalBudgeted > 0 ? Math.min(100, (totalSpent/totalBudgeted)*100) : 0;
    const overColor = overallPct >= 100 ? 'text-red-600' : overallPct >= 80 ? 'text-orange-500' : 'text-sage-600';

    const items = budgets.map(b => {
      const spent = parseFloat(b.spent) || 0;
      const limit = parseFloat(b.limit_amount) || 0;
      const pct = limit > 0 ? Math.min(100, (spent/limit)*100) : 0;
      const barColor = pct >= 100 ? '#C0402F' : pct >= 80 ? '#C87B2A' : '#4A7C59';
      const remaining = limit - spent;
      const isOver = remaining < 0;
      const statusLabel = isOver ? `${fmt(Math.abs(remaining))} over` : `${fmt(remaining)} left`;
      const statusIcon = pct >= 100 ? '🚨' : pct >= 80 ? '⚠️' : '✅';

      return `
        <div class="border-b border-warm-200/50 last:border-0 py-4">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
              <span class="text-xl">${getCatIcon(b.category)}</span>
              <span class="text-[15px] font-semibold text-warm-600">${escHtml(b.category)}</span>
              <span class="text-base">${statusIcon}</span>
            </div>
            <button onclick="deleteBudget(${b.id})" class="text-red-400 active:opacity-50 text-xl px-1">×</button>
          </div>
          <div class="flex justify-between text-[12px] text-warm-400 mb-1.5">
            <span>Spent: <strong class="text-warm-600">${fmt(spent)}</strong></span>
            <span class="${isOver?'text-red-500 font-semibold':'text-sage-600 font-semibold'}">${statusLabel}</span>
          </div>
          <div class="h-2 bg-warm-200/60 rounded-full overflow-hidden mb-1.5">
            <div class="h-full rounded-full progress-bar" style="width:${pct}%;background:${barColor};"></div>
          </div>
          <div class="flex justify-between text-[11px] text-warm-400">
            <span>Budget: <strong class="text-warm-500">${fmt(limit)}</strong></span>
            <span class="font-mono">${pct.toFixed(0)}% used</span>
          </div>
        </div>`;
    }).join('');

    wrap.innerHTML = `
      <div class="bg-warm-50 rounded-2xl border border-warm-300/40 shadow-sm overflow-hidden">
        <div class="p-4 border-b border-warm-200/50">
          <div class="text-[11px] font-bold uppercase tracking-widest text-warm-400 mb-3">Monthly Budgets — ${formatMonth(currentMonth)}</div>
          <div class="flex items-center justify-between mb-2">
            <span class="text-[13px] text-warm-500">Overall: ${fmt(totalSpent)} / ${fmt(totalBudgeted)}</span>
            <span class="text-[13px] font-bold ${overColor}">${overallPct.toFixed(0)}% used</span>
          </div>
          <div class="h-2.5 bg-warm-200/60 rounded-full overflow-hidden">
            <div class="h-full rounded-full progress-bar" style="width:${overallPct}%;background:${overallPct>=100?'#C0402F':overallPct>=80?'#C87B2A':'#4A7C59'};"></div>
          </div>
        </div>
        <div class="px-4">${items}</div>
      </div>`;
  } catch(e) {
    wrap.innerHTML = `<div class="text-center py-8 text-warm-400">Failed to load budgets</div>`;
  }
}

async function saveBudget() {
  if (isSaving) return;
  const category = document.getElementById('budgetCat').value;
  const limit_amount = parseFloat(document.getElementById('budgetLimit').value);
  if (!limit_amount || limit_amount <= 0) return showToast('Enter a valid limit');
  isSaving = true;
  const btn = document.getElementById('saveBudgetBtn');
  btn.textContent = '...'; btn.style.opacity = '0.5';
  try {
    await fetchJSON(`${API}/budgets`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({category, limit_amount, month: currentMonth})
    });
    closeBudgetSheet();
    showToast('Budget saved ✓');
    await renderBudgets();
  } catch(e) { showToast('Error saving budget'); }
  finally { isSaving = false; btn.textContent = 'Save'; btn.style.opacity = ''; }
}

async function deleteBudget(id) {
  if (!confirm('Delete this budget?')) return;
  try {
    await fetchJSON(`${API}/budgets/${id}`, {method:'DELETE'});
    showToast('Budget removed');
    await renderBudgets();
  } catch(e) { showToast('Error deleting'); }
}

// ─── MASCOT (DB-saved) ───────────────────────────────────
async function handleMascotUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;
    showMascotImg(base64);
    showToast('Uploading photo...');
    try {
      await fetchJSON(`${API}/settings`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({key:'mascotImage', value: base64})
      });
      showToast('Capybara saved! 🌿');
    } catch(err) {
      console.error('Could not save to DB:', err);
      showToast('Saved locally only');
      try { localStorage.setItem('capyMascotFallback', base64); } catch{}
    }
  };
  reader.readAsDataURL(file);
}

function showMascotImg(src) {
  document.getElementById('mascotPlaceholder').classList.add('hidden');
  const img = document.getElementById('mascotImg');
  img.src = src;
  img.classList.remove('hidden');
}

async function restoreMascot() {
  try {
    const data = await fetchJSON(`${API}/settings?key=mascotImage`);
    if (data && data.value) { showMascotImg(data.value); return; }
  } catch{}
  // fallback to localStorage
  try { const fb = localStorage.getItem('capyMascotFallback'); if (fb) showMascotImg(fb); } catch{}
}

// ─── TOAST ───────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.classList.remove('toast-show');
  t.style.opacity = '';
  void t.offsetWidth;
  t.classList.add('toast-show');
  toastTimer = setTimeout(() => { t.classList.remove('toast-show'); }, 2100);
}

// ─── INIT ────────────────────────────────────────────────
// Set initial sheet transforms
document.getElementById('sheet').style.transform = 'translateX(-50%) translateY(100%)';
document.getElementById('budgetSheet').style.transform = 'translateX(-50%) translateY(100%)';
document.getElementById('sheet').style.transition = 'transform 0.35s cubic-bezier(0.32,0.72,0,1)';
document.getElementById('budgetSheet').style.transition = 'transform 0.35s cubic-bezier(0.32,0.72,0,1)';

restoreMascot();
refreshAll();
</script>
